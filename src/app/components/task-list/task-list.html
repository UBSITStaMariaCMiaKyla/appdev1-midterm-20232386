<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>All Tasks</h2>
    <a routerLink="/tasks/new" class="btn btn-primary">+ Add Task</a>
  </div>
  
  <div *ngIf="tasks.length === 0" class="alert alert-info">
    No tasks found. Click "Add Task" to get started!
  </div>
  
  <div class="table-responsive" *ngIf="tasks.length > 0">
    <table class="table table-striped table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Title</th>
          <th>Due Date</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let task of tasks">
          <td>{{ task.id }}</td>
          <td>{{ task.title }}</td>
          <td>{{ task.dueDate }}</td>
          <td><span [class]="getPriorityClass(task.priority)">{{ task.priority }}</span></td>
          <td><span [class]="getStatusClass(task.status)">{{ task.status }}</span></td>
          <td>
            <a [routerLink]="['/tasks', task.id]" class="btn btn-sm btn-info me-1">View</a>
            <button class="btn btn-sm btn-warning me-1" (click)="toggleStatus(task.id)">Toggle</button>
            <button class="btn btn-sm btn-danger" (click)="deleteTask(task.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
