<div class="page-header">
    <div>
      <h2>All Tasks</h2>
      <span class="task-count">{{ tasks.length }} tasks total</span>
    </div>
    <a routerLink="/tasks/new" class="btn btn-primary">+ Add Task</a>
  </div>
  
  <div *ngIf="tasks.length === 0" class="alert alert-info">
    No tasks yet. Click "+ Add Task" to get started.
  </div>
  
  <div *ngFor="let task of tasks"
    class="task-card"
    [class.priority-high]="task.priority === 'High'"
    [class.priority-medium]="task.priority === 'Medium'"
    [class.priority-low]="task.priority === 'Low'">
  
    <span class="task-id">#{{ task.id }}</span>
    <span class="task-title">{{ task.title }}</span>
  
    <div class="task-badges">
      <span [class]="getPriorityClass(task.priority)">{{ task.priority }}</span>
      <span [class]="getStatusClass(task.status)">{{ task.status }}</span>
    </div>
  
    <span class="task-due">{{ task.dueDate }}</span>
  
    <div class="task-actions">
      <a [routerLink]="['/tasks', task.id]" class="btn btn-info">View</a>
      <button class="btn btn-warning" (click)="toggleStatus(task.id)">Toggle</button>
      <button class="btn btn-danger" (click)="confirmDelete(task.id, task.title)">Delete</button>
    </div>
  </div>
  
  <!-- Custom Delete Modal -->
  <div class="modal-backdrop" *ngIf="showModal">
    <div class="modal-box">
      <p class="modal-title">Delete Task</p>
      <p class="modal-message">Are you sure you want to delete <strong>{{ taskToDeleteTitle }}</strong>?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" (click)="cancelDelete()">Cancel</button>
        <button class="btn btn-danger" (click)="confirmDeleteFinal()">Delete</button>
      </div>
    </div>
  </div>
