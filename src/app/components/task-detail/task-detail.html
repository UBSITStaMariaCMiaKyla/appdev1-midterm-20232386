<div *ngIf="invalidId" class="alert alert-danger">
    Task not found. The ID provided is invalid.
    <a routerLink="/tasks" class="btn btn-sm btn-outline-danger ms-2">Back to List</a>
  </div>
  
  <div *ngIf="task && !invalidId">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center bg-primary text-white">
        <h4 class="mb-0">{{ task.title }}</h4>
        <span [class]="getStatusClass(task.status)">{{ task.status }}</span>
      </div>
      <div class="card-body">
        <ul class="nav nav-tabs mb-3">
          <li class="nav-item">
            <a class="nav-link"
              [routerLink]="['info']"
              routerLinkActive="active">
              Task Info
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link"
              [routerLink]="['edit']"
              routerLinkActive="active">
              Edit Task
            </a>
          </li>
        </ul>
        <router-outlet></router-outlet>
      </div>
    </div>
  
    <div class="mt-3">
      <a routerLink="/tasks" class="btn btn-secondary">← Back to List</a>
    </div>
  </div>
